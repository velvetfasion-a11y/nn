<section class="jj-product-carousel jj-product-carousel--track" id="jj-shop" data-i18n-aria="carousel.aria" aria-label="Collections carousel">
  <div class="jj-product-carousel__inner">
    <div class="jj-product-carousel__header jj-product-carousel__header--track">
      <h3 class="jj-product-carousel__title" data-i18n="carousel.title">Signature Pieces</h3>
      <div class="jj-product-carousel__nav" aria-hidden="false">
        <button type="button" class="jj-product-carousel__arrow" id="jj-product-prev" data-i18n-aria="carousel.prev" aria-label="Previous products">
          <span aria-hidden="true">←</span>
        </button>
        <button type="button" class="jj-product-carousel__arrow" id="jj-product-next" data-i18n-aria="carousel.next" aria-label="Next products">
          <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>

    <div class="jj-product-carousel__track" id="jj-product-scroll">
      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/women.jpg" data-i18n-alt="products.silkMidi" alt="The Silk Midi Dress" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name" data-i18n="products.silkMidi">The Silk Midi Dress</h3>
          <p class="jj-product-card__price">420 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/men.jpg" data-i18n-alt="products.woolBlazer" alt="The Tailored Wool Blazer" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name" data-i18n="products.woolBlazer">The Tailored Wool Blazer</h3>
          <p class="jj-product-card__price">890 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/kids.jpg" data-i18n-alt="products.linenSet" alt="The Relaxed Linen Set" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name" data-i18n="products.linenSet">The Relaxed Linen Set</h3>
          <p class="jj-product-card__price">680 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/collection-01.jpg" data-i18n-alt="products.silkKaftan" alt="Embroidered Silk Kaftan" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name" data-i18n="products.silkKaftan">Embroidered Silk Kaftan</h3>
          <p class="jj-product-card__price">1,250 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/collection-02.jpg" data-i18n-alt="products.woolCoat" alt="The Nordic Wool Coat" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name" data-i18n="products.woolCoat">The Nordic Wool Coat</h3>
          <p class="jj-product-card__price">520 €</p>
        </div>
      </article>
    </div>
  </div>
</section>
