<section class="jj-product-carousel" id="jj-shop" aria-label="Collections">
  <div class="jj-product-carousel__inner">
    <div class="jj-product-carousel__header">
      <h2 class="jj-product-carousel__title collections-heading">COLLECTIONS</h2>
      <div class="jj-product-carousel__nav" aria-hidden="false">
        <button type="button" class="jj-product-carousel__arrow" id="jj-product-prev" aria-label="Previous products">
          <span aria-hidden="true">←</span>
        </button>
        <button type="button" class="jj-product-carousel__arrow" id="jj-product-next" aria-label="Next products">
          <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>

    <div class="jj-product-carousel__track" id="jj-product-scroll">
      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/women.jpg" alt="The Silk Midi Dress" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name">The Silk Midi Dress</h3>
          <p class="jj-product-card__price">420 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/men.jpg" alt="The Tailored Wool Blazer" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name">The Tailored Wool Blazer</h3>
          <p class="jj-product-card__price">890 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/kids.jpg" alt="The Relaxed Linen Set" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name">The Relaxed Linen Set</h3>
          <p class="jj-product-card__price">680 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/collection-01.jpg" alt="Embroidered Silk Kaftan" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name">Embroidered Silk Kaftan</h3>
          <p class="jj-product-card__price">1,250 €</p>
        </div>
      </article>

      <article class="jj-product-card">
        <div class="jj-product-card__media">
          <img src="assets/images/collection-02.jpg" alt="The Nordic Wool Coat" loading="lazy" decoding="async">
        </div>
        <div class="jj-product-card__meta">
          <h3 class="jj-product-card__name">The Nordic Wool Coat</h3>
          <p class="jj-product-card__price">520 €</p>
        </div>
      </article>
    </div>
  </div>
</section>
