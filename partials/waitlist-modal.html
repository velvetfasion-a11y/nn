<div id="jj-waitlist-modal" class="jj-waitlist-modal" aria-hidden="true" role="dialog" aria-labelledby="jj-waitlist-title" aria-modal="true">
  <div class="jj-waitlist-modal__backdrop" data-jj-close-modal></div>
  <div class="jj-waitlist-modal__panel" role="document">
    <div class="jj-waitlist-modal__header">
      <div>
        <h3 class="jj-waitlist-modal__title" id="jj-waitlist-title" data-i18n="waitlist.title">Join the circle</h3>
        <p class="jj-waitlist-modal__sub" data-i18n="waitlist.sub">Wear the moment, before anyone else.</p>
      </div>
      <button type="button" class="jj-waitlist-modal__close" data-jj-close-modal data-i18n-aria="waitlist.close" aria-label="Close">&times;</button>
    </div>

    <section class="notify-section jj-waitlist-notify">
      <form class="notify-form jj-waitlist-form" id="jj-waitlist-form">
        <input class="notify-input jj-waitlist-input" type="email" data-i18n-placeholder="waitlist.placeholder" placeholder="your@email.com" autocomplete="email" required>
        <button class="notify-btn jj-waitlist-submit" type="submit" data-i18n="waitlist.submit">RESERVE MY PLACE</button>
        <p class="jj-waitlist-note" data-i18n="waitlist.note">Cancel anytime</p>
      </form>
      <div class="notify-success jj-waitlist-success" id="jj-waitlist-success">
        <span data-i18n="waitlist.success">Thank you. A personal note will arrive in your inbox soon.</span>
      </div>
    </section>
  </div>
</div>
