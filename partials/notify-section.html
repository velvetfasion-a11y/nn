<section class="notify-section" id="notify-section">
  <div class="notify-inner">
    <p class="notify-eyebrow">Coming Soon</p>
    <h2 class="notify-heading">GET NOTIFIED<br>WHEN WE LAUNCH</h2>
    <p class="notify-sub">Be first to access new collections and exclusive drops.</p>

    <form class="notify-form">
      <div class="notify-input-row">
        <input
          class="notify-input"
          type="email"
          placeholder="Your email address"
          required
          id="notifyEmail"
        />
        <button class="notify-btn" type="submit">
          <span class="btn-text">Notify Me</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
      <p class="notify-privacy">No spam. Unsubscribe anytime.</p>
    </form>

    <div class="notify-success" id="notifySuccess">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6 10L9 13L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>You're on the list. We'll be in touch.</span>
    </div>
  </div>
</section>
