<div class="jj-site-bottom">
  <section class="notify-section notify-section--bottom" id="notify-section">
    <div class="jj-footer-logo">
      <img src="/assets/images/logo.png" alt="Jamil Jamila" width="48" height="48" loading="lazy" decoding="async">
    </div>
    <div class="notify-inner">
      <span class="notify-section__eyebrow" data-i18n="notify.eyebrow">The Circle</span>
      <h3 class="notify-section__title" data-i18n="notify.title">Be Among the First</h3>
      <button
        type="button"
        class="jj-notify-trigger"
        data-jj-open-notify
        aria-haspopup="dialog"
        aria-controls="jj-waitlist-modal"
      >
        <span data-i18n="notify.button">Get Notified</span>
        <span class="jj-notify-trigger__arrow" aria-hidden="true">→</span>
      </button>
    </div>
  </section>

  <footer class="jj-footer">
    <nav class="jj-footer-titles" aria-label="Footer links">
      <div class="jj-footer-titles__links">
        <a href="#" class="jj-footer-titles__link" data-i18n="footer.location">LOCATION</a>
        <a href="#" class="jj-footer-titles__link" data-i18n="footer.clientService">CLIENT SERVICE</a>
        <a href="#" class="jj-footer-titles__link" data-i18n="footer.aboutUs">ABOUT US</a>
        <a href="#" class="jj-footer-titles__link" data-i18n="footer.legal">LEGAL</a>
        <div class="jj-footer-locale" id="jj-footer-locale">
          <button
            type="button"
            class="jj-footer-titles__link jj-footer-locale__toggle"
            id="jj-locale-toggle"
            aria-expanded="false"
            aria-haspopup="listbox"
            aria-controls="jj-locale-menu"
            data-i18n-aria="footer.chooseLanguage"
            aria-label="Choose language"
          >
            <span data-i18n="locale.display">SWEDEN – EN</span>
            <span class="jj-footer-locale__caret" aria-hidden="true">▾</span>
          </button>
          <ul class="jj-footer-locale__menu" id="jj-locale-menu" role="listbox" hidden></ul>
        </div>
      </div>
    </nav>
    <div class="jj-footer__divider" aria-hidden="true"></div>
    <p class="jj-footer__copy">© 2024 JAMIL JAMILA. ALL RIGHTS RESERVED.</p>
  </footer>
</div>
